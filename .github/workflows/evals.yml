name: Evals

# LLM quality gate: runs the intent and tool-use evals against the REAL model on every PR
# to main, and FAILS the build if accuracy regresses below its threshold. This is what
# turns a prompt/behavior regression (like the "boa tarde" -> off_topic bug) red BEFORE
# merge, instead of discovering it in production.
#
# Runs on pull_request (not every push) to bound cost — ~45 DeepSeek calls per run, a few
# cents. Same-repo branches get the DEEPSEEK_API_KEY secret; forks don't (and shouldn't).

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evals:
    name: LLM evals (intent + tool-use)
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      QDRANT_HOST: http://localhost:6333
      ADMIN_API_TOKEN: ci-dummy
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Assert DeepSeek key is available
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "::error::DEEPSEEK_API_KEY secret is missing — the evals gate cannot run."
            exit 1
          fi
      - name: Intent classification eval (gate >= 90%)
        run: python evals/run_intents.py --threshold 0.9
      - name: Tool-use eval (gate >= 75%)
        run: python evals/run_tools.py --threshold 0.75
