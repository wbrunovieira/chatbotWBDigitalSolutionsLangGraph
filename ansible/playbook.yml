---
- name: Deploy WB Digital Solutions Chatbot
  hosts: chatbot_server
  become: yes
  gather_facts: yes

  vars:
    app_name: wb-chatbot
    repo_url: https://github.com/YOUR_GITHUB_USER/chatbotwbdigitalsolutions2MVP.git

  tasks:
    - name: Display deployment information
      debug:
        msg:
          - "Deploying to: {{ ansible_host }}"
          - "Application directory: {{ install_path }}"
          - "Domain: {{ chatbot_domain }}"
          - "App Port: {{ app_port }}"
          - "Qdrant Port: {{ qdrant_port }}"
          - "Redis Port: {{ redis_port }}"

    - name: Verify Docker is installed and running
      command: docker --version
      register: docker_check
      failed_when: docker_check.rc != 0

    - name: Verify Docker Compose is available
      command: docker compose version
      register: compose_check
      failed_when: compose_check.rc != 0

    - name: Create application directory structure
      file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop:
        - "{{ install_path }}"
        - "{{ install_path }}/volumes"
        - "{{ install_path }}/volumes/qdrant_data"
        - "{{ install_path }}/volumes/redis_data"
        - "{{ install_path }}/logs"
        - "{{ install_path }}/backups"

    - name: Clone or update repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ install_path }}"
        force: yes
        version: main
      when: repo_url != 'https://github.com/YOUR_GITHUB_USER/chatbotwbdigitalsolutions2MVP.git'

    - name: Check if Docker network exists
      command: docker network ls --format '{{ '{{' }}.Name{{ '}}' }}'
      register: docker_networks

    - name: Create Docker network if not exists
      command: docker network create {{ docker_network }}
      when: docker_network not in docker_networks.stdout_lines

    # Secrets are generated ON the target, once, and persisted. The previous
    # `set_fact | default(lookup('password', '/dev/null'))` never fired, because the
    # inventory defines these vars as the literal string "generate_on_deploy" — so
    # `default()` saw them as already-set and the "password" would have been the
    # placeholder itself. `/dev/null` also meant a fresh value on every run, which
    # would have rotated the credentials out from under the running containers.
    - name: Create secrets directory
      file:
        path: "{{ install_path }}/.secrets"
        state: directory
        owner: root
        group: root
        mode: '0700'

    - name: Generate secrets on first deploy only
      shell: "umask 077 && openssl rand -hex 32 > {{ install_path }}/.secrets/{{ item }}"
      args:
        creates: "{{ install_path }}/.secrets/{{ item }}"
      loop:
        - redis_password
        - qdrant_api_key
        - admin_api_token

    - name: Enforce permissions on secret files
      file:
        path: "{{ install_path }}/.secrets/{{ item }}"
        owner: root
        group: root
        mode: '0600'
      loop:
        - redis_password
        - qdrant_api_key
        - admin_api_token

    - name: Read persisted secrets
      slurp:
        src: "{{ install_path }}/.secrets/{{ item }}"
      register: chatbot_secrets
      no_log: true
      loop:
        - redis_password
        - qdrant_api_key
        - admin_api_token

    - name: Resolve secrets into facts
      set_fact:
        resolved_redis_password: "{{ chatbot_secrets.results[0].content | b64decode | trim }}"
        resolved_qdrant_api_key: "{{ chatbot_secrets.results[1].content | b64decode | trim }}"
        resolved_admin_api_token: "{{ chatbot_secrets.results[2].content | b64decode | trim }}"
      no_log: true

    - name: Remove ALL old compose files FIRST
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ install_path }}/compose.yaml"
        - "{{ install_path }}/compose.yml"
        - "{{ install_path }}/docker-compose.yml"
        - "{{ install_path }}/docker-compose.yaml"
        - "{{ install_path }}/compose.local.yaml"
      ignore_errors: yes

    - name: Stop and remove conflicting containers
      shell: |
        docker stop wb_redis wb_qdrant 2>/dev/null || true
        docker rm wb_redis wb_qdrant 2>/dev/null || true
      ignore_errors: yes

    - name: Copy production environment file
      template:
        src: templates/env.j2
        dest: "{{ install_path }}/.env"
        mode: '0600'
        owner: root
        group: root

    - name: Copy production docker-compose file
      template:
        src: templates/docker-compose.prod.yml.j2
        dest: "{{ install_path }}/docker-compose.yml"
        mode: '0644'
        owner: root
        group: root

    - name: Copy application files if not using git
      synchronize:
        src: "{{ playbook_dir }}/../"
        dest: "{{ install_path }}/"
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=ansible"
          - "--exclude=__pycache__"
          - "--exclude=.env"
          - "--exclude=volumes"
          - "--exclude=compose.yaml"
          - "--exclude=compose.yml"
          - "--exclude=compose.local.yaml"
          - "--exclude=docker-compose.override.yml"
          - "--exclude=docker-compose.local.yml"
      when: repo_url == 'https://github.com/YOUR_GITHUB_USER/chatbotwbdigitalsolutions2MVP.git'

    - name: List files in application directory
      command: ls -la
      args:
        chdir: "{{ install_path }}"
      register: dir_contents

    - name: Show directory contents
      debug:
        var: dir_contents.stdout_lines

    - name: Build Docker image
      command: docker compose -f docker-compose.yml build
      args:
        chdir: "{{ install_path }}"
      register: build_result

    - name: Stop existing containers
      command: docker compose -f docker-compose.yml down
      args:
        chdir: "{{ install_path }}"
      ignore_errors: yes

    - name: Start application containers
      command: docker compose -f docker-compose.yml up -d
      args:
        chdir: "{{ install_path }}"
      register: deploy_result
      ignore_errors: yes

    - name: Check container status
      command: docker ps -a
      register: container_status

    - name: Show container status
      debug:
        var: container_status.stdout_lines

    - name: Check Qdrant logs if unhealthy
      command: docker logs chatbot_qdrant --tail 50
      register: qdrant_logs
      ignore_errors: yes

    - name: Show Qdrant logs
      debug:
        var: qdrant_logs.stdout_lines
      when: qdrant_logs is defined

    - name: Wait for application to be healthy
      uri:
        url: "http://localhost:{{ app_port }}/health"
        status_code: 200
      register: result
      until: result.status == 200
      retries: 30
      delay: 10
      ignore_errors: yes

    # Defense in depth ONLY. UFW is not what closes Qdrant/Redis: Docker publishes
    # ports by writing straight to the DOCKER-USER iptables chain, which UFW does not
    # filter, so a `ufw deny 6333` on a published container port is a no-op. What
    # actually closes them is removing `ports:` from docker-compose.prod.yml.j2.
    # These rules protect host-level services and catch a future accidental re-publish
    # of a port on the host itself.
    - name: Install UFW
      apt:
        name: ufw
        state: present
        update_cache: yes

    - name: Allow SSH before enabling the firewall
      ufw:
        rule: allow
        port: '22'
        proto: tcp

    # --- HTTP/HTTPS exposure (stage 3: origin lockdown behind Cloudflare) ---
    # Gated on `restrict_http_to_cloudflare` (default false). While false, 80/443 are
    # open to the internet exactly as before. Only flip it to true AFTER the DNS
    # record is orange-clouded (proxied) and verified, or the origin locks everyone
    # out. SSH (22) stays open regardless — Cloudflare does not proxy SSH.
    - name: Fetch Cloudflare edge IP ranges (v4 + v6)
      uri:
        url: "{{ item }}"
        return_content: yes
      register: cf_ip_lists
      loop:
        - https://www.cloudflare.com/ips-v4
        - https://www.cloudflare.com/ips-v6
      when: restrict_http_to_cloudflare | default(false) | bool

    - name: Build the Cloudflare CIDR list
      # join the fetched v4+v6 blobs, then .split() on whitespace/newlines -> flat
      # CIDR list with no empty entries.
      set_fact:
        cloudflare_ips: "{{ (cf_ip_lists.results | map(attribute='content') | join('\n')).split() }}"
      when: restrict_http_to_cloudflare | default(false) | bool

    - name: Allow HTTP/HTTPS from anywhere (origin NOT yet behind Cloudflare)
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - '80'
        - '443'
      when: not (restrict_http_to_cloudflare | default(false) | bool)

    - name: Allow HTTP/HTTPS only from Cloudflare ranges (origin behind Cloudflare)
      ufw:
        rule: allow
        port: "{{ item.1 }}"
        proto: tcp
        from_ip: "{{ item.0 }}"
      loop: "{{ cloudflare_ips | product(['80', '443']) | list }}"
      when: restrict_http_to_cloudflare | default(false) | bool

    - name: Remove the allow-from-anywhere HTTP/HTTPS rules when locking to Cloudflare
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
        delete: yes
      loop:
        - '80'
        - '443'
      when: restrict_http_to_cloudflare | default(false) | bool

    - name: Deny direct access to app, Qdrant and Redis ports
      ufw:
        rule: deny
        port: "{{ item }}"
        proto: tcp
      loop:
        - "{{ app_port }}"
        - "{{ qdrant_port }}"
        - "{{ redis_port }}"

    - name: Enable UFW with default-deny on inbound traffic
      ufw:
        state: enabled
        default: deny
        direction: incoming

    - name: Install Nginx and Certbot
      apt:
        name:
          - nginx
          - certbot
          - python3-certbot-nginx
        state: present
        update_cache: yes

    - name: Remove old Nginx configurations if exists
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/nginx/sites-enabled/chatbot.wbdigitalsolutions.com.conf
        - /etc/nginx/sites-available/chatbot.wbdigitalsolutions.com.conf
      ignore_errors: yes

    - name: Configure Nginx for chatbot
      template:
        src: templates/nginx-chatbot.conf.j2
        dest: /etc/nginx/sites-available/chatbot.conf
        mode: '0644'

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/chatbot.conf
        dest: /etc/nginx/sites-enabled/chatbot.conf
        state: link

    - name: Test Nginx configuration
      command: nginx -t
      register: nginx_config_test
      ignore_errors: yes

    - name: Reload Nginx
      systemd:
        name: nginx
        state: reloaded
      when: nginx_config_test.rc == 0

    - name: Setup SSL certificate with Certbot
      command: certbot --nginx -n --agree-tos --email {{ ssl_email }} -d {{ chatbot_domain }} --redirect
      register: ssl_result
      ignore_errors: yes
      when: ansible_host != "localhost" and ansible_host != "127.0.0.1"

    - name: Setup auto-renewal for SSL certificate
      cron:
        name: "Auto renew SSL certificates"
        job: "certbot renew --quiet --no-self-upgrade"
        minute: "0"
        hour: "2"
        weekday: "1"
      when: ssl_result is defined and ssl_result.rc == 0

    - name: Schedule daily chat_logs retention purge (LGPD)
      cron:
        name: "chat_logs retention purge"
        job: "docker exec chatbot_app python -m rag.retention >> /var/log/chatbot-retention.log 2>&1"
        minute: "0"
        hour: "3"

    - name: Clean up old Docker images
      command: docker image prune -f
      ignore_errors: yes

    - name: Display deployment status
      debug:
        msg:
          - "=========================================="
          - "Deployment completed successfully!"
          - "=========================================="
          - "HTTPS URL: https://{{ chatbot_domain }}"
          - "=========================================="
          - "Qdrant and Redis are NOT reachable from the internet any more."
          - "Qdrant dashboard, from your machine, over an SSH tunnel:"
          - "  ssh -L 6333:chatbot_qdrant:6333 root@{{ ansible_host }}"
          - "  then open http://localhost:6333/dashboard"
          - "  (API key: cat {{ install_path }}/.secrets/qdrant_api_key)"
          - "=========================================="
          - "Test the API:"
          - "curl https://{{ chatbot_domain }}/health"
          - "=========================================="

    - name: Show container status
      command: docker ps --filter "name=chatbot"
      register: container_status

    - name: Display container status
      debug:
        var: container_status.stdout_lines